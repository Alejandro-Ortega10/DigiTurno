<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Digiturno</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            padding: 40px; 
            background: #f1f5f9; 
            color: #1e293b;
            max-width: 800px;
            margin: auto;
        }
        h1 { font-weight: 800; margin-bottom: 2rem; text-align: center; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-card h3 { font-size: 0.875rem; color: #64748b; text-transform: uppercase; margin-bottom: 0.5rem; }
        .stat-card div { font-size: 2.5rem; font-weight: 700; color: #2563eb; }
        .btn-refresh {
            display: block;
            width: 200px;
            margin: auto;
            padding: 0.75rem;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-refresh:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <h1>Estadísticas de Hoy</h1>
    
    <div class="grid">
        <div class="stat-card">
            <h3>Total Emitidos</h3>
            <div id="total">0</div>
        </div>
        <div class="stat-card">
            <h3>Total Atendidos</h3>
            <div id="atendidos">0</div>
        </div>
    </div>

    <button class="btn-refresh" onclick="cargar()">Actualizar Datos</button>

    <script>
        const API_KEY = "admin123";
        async function cargar() {
            try {
                const res = await fetch('/api/admin/estadisticas', {
                    headers: { 'X-API-Key': API_KEY }
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById("total").innerText = data.total_creados_hoy;
                    document.getElementById("atendidos").innerText = data.atendidos_hoy;
                }
            } catch (e) {
                console.error("Error al cargar estadísticas", e);
            }
        }
        cargar();
        setInterval(cargar, 30000); // Auto-refresh cada 30s
    </script>
</body>
</html>
