<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Turno - Digiturno</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; color: #0f172a; }
        p { color: #64748b; margin-bottom: 2.5rem; }
        .btn { 
            display: block; 
            width: 100%; 
            padding: 1.25rem; 
            margin-bottom: 1rem; 
            font-size: 1.25rem; 
            font-weight: 600;
            background: white; 
            color: var(--text); 
            border: 2px solid #e2e8f0; 
            border-radius: 1rem; 
            cursor: pointer; 
            transition: all 0.2s;
            text-decoration: none;
            box-sizing: border-box;
        }
        .btn:hover { 
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.1);
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
        }
        .btn-primary:hover {
            background: #1d4ed8;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bienvenido</h1>
        <p>Selecciona un servicio para obtener tu turno impreso.</p>
        
        <button class="btn btn-primary" onclick="obtenerTurno('caja')">Atención en Caja</button>
        <button class="btn" onclick="obtenerTurno('asesoria')">Asesoría Comercial</button>
    </div>

    <script>
        function obtenerTurno(servicio) {
            // IMPORTANTE: Solo funcionará si accedes vía http://localhost:8000
            window.location.href = `/api/cliente/solicitar/${servicio}`;
        }
    </script>
</body>
</html>
