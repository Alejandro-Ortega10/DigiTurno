    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h2 { margin-bottom: 1.5rem; font-weight: 700; color: var(--text); }
        .config-box {
            background: #f1f5f9;
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
            text-align: left;
        }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; }
        input, select { 
            width: 100%;
            padding: 0.75rem; 
            font-size: 1rem; 
            border: 1px solid #e2e8f0; 
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            box-sizing: border-box;
            font-family: inherit;
        }
        #turno_actual { 
            font-size: 4rem; 
            font-weight: 800;
            color: var(--primary); 
            margin: 2rem 0;
            min-height: 5rem;
        }
        .btn {
            width: 100%;
            padding: 1rem;
            font-size: 1.125rem;
            font-weight: 600;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-llamar { background: var(--primary); color: white; margin-bottom: 1rem; }
        .btn-llamar:hover { background: #1d4ed8; transform: translateY(-2px); }
        .btn-finalizar { background: #fee2e2; color: #dc2626; }
        .btn-finalizar:hover { background: #fecaca; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    </style>
</head>
